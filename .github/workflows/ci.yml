name: CI

on:
  push:
    branches: [private]
  pull_request:
    branches: [private]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: monpetitappart
          POSTGRES_PASSWORD: monpetitappart
          POSTGRES_DB: monpetitappart_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 1s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://monpetitappart:monpetitappart@localhost:5432/monpetitappart_dev?schema=public
      DIRECT_URL: postgresql://monpetitappart:monpetitappart@localhost:5432/monpetitappart_dev
      PAYLOAD_SECRET: test-secret
      PAYLOAD_PUBLIC_SERVER_URL: http://localhost:3001
      NEXTAUTH_SECRET: test-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Run Prisma Migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          DIRECT_URL: ${{ env.DIRECT_URL }}

      - name: Build Next.js
        run: npm run build

      - name: Run tests
        run: npm test
