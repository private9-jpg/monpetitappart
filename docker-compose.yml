services:
  postgres:
    image: postgres:16-alpine
    container_name: monpetitappart-postgres
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-monpetitappart}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-monpetitappart}
      POSTGRES_DB: ${POSTGRES_DB:-monpetitappart_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-monpetitappart}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - monpetitappart

  adminer:
    image: adminer:latest
    container_name: monpetitappart-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - monpetitappart

  redis:
    image: redis:7-alpine
    container_name: monpetitappart-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - monpetitappart

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: monpetitappart-app
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      PAYLOAD_PUBLIC_SERVER_URL: ${PAYLOAD_PUBLIC_SERVER_URL:-http://localhost:3001}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY}
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL:-redis://redis:6379}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN:-}
      RESEND_API_KEY: ${RESEND_API_KEY}
      NOTIFICATION_EMAIL: ${NOTIFICATION_EMAIL:-admin@monpetitappart.fr}
      CRON_SECRET: ${CRON_SECRET}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) })\""]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - monpetitappart

  payload:
    build:
      context: .
      dockerfile: Dockerfile.payload
    container_name: monpetitappart-payload
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      PAYLOAD_PUBLIC_SERVER_URL: ${PAYLOAD_PUBLIC_SERVER_URL:-http://localhost:3001}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - monpetitappart

  backup:
    image: postgres:16-alpine
    container_name: monpetitappart-backup
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-monpetitappart}
    volumes:
      - ./backups:/backups
    entrypoint: >
      sh -c "
        while true; do
          sleep 86400;
          pg_dump -U ${POSTGRES_USER:-monpetitappart} -h postgres -d ${POSTGRES_DB:-monpetitappart_dev} -f /backups/backup-$$(date +%Y%m%d).sql --no-owner --no-privileges;
        done
      "
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - monpetitappart

volumes:
  postgres_data:
  redis_data:

networks:
  monpetitappart:
    driver: bridge
