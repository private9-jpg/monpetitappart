services:
  postgres:
    image: postgres:16-alpine
    container_name: monpetitappart-postgres
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-monpetitappart}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-monpetitappart}
      POSTGRES_DB: ${POSTGRES_DB:-monpetitappart_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-monpetitappart}"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: monpetitappart-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
