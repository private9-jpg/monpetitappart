services:
  postgres:
    image: postgres:16-alpine
    container_name: monpetitappart-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: monpetitappart
      POSTGRES_PASSWORD: monpetitappart
      POSTGRES_DB: monpetitappart
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monpetitappart"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: monpetitappart-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
